<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="currentColor" stroke="currentColor">
  <!-- Mountain ridge silhouette — jagged peaks along the bottom -->
  <g stroke="none">
    <!-- Main mountain range — single continuous polygon -->
    <polygon points="
      0,1080
      0,920
      80,880
      140,840
      200,900
      260,830
      340,780
      400,850
      440,810
      520,720
      580,760
      620,700
      680,740
      720,680
      800,640
      860,700
      920,660
      960,600
      1020,650
      1060,620
      1120,580
      1160,640
      1200,610
      1260,660
      1320,620
      1360,680
      1400,720
      1440,690
      1500,740
      1540,780
      1600,730
      1660,770
      1700,820
      1760,790
      1820,850
      1880,830
      1920,870
      1920,1080
    "/>

    <!-- Secondary ridge behind — slightly higher, partial visibility -->
    <polygon points="
      300,1080
      300,850
      380,800
      440,830
      500,770
      560,810
      600,750
      660,780
      700,730
      740,760
      780,700
      840,730
      880,690
      940,650
      1000,680
      1040,640
