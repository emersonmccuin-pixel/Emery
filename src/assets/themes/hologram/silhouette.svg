<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none" stroke="currentColor" stroke-width="1">
  <!-- Hologram: scanline grid + prism refraction bars -->
  <g opacity="1">
    <!-- Scanline grid (full viewport, subtle) -->
    <g opacity="0.25">
      <!-- Horizontal scanlines -->
      <line x1="0" y1="60" x2="1920" y2="60" stroke-width="0.3"/>
      <line x1="0" y1="120" x2="1920" y2="120" stroke-width="0.3"/>
      <line x1="0" y1="180" x2="1920" y2="180" stroke-width="0.3"/>
      <line x1="0" y1="240" x2="1920" y2="240" stroke-width="0.3"/>
      <line x1="0" y1="300" x2="1920" y2="300" stroke-width="0.3"/>
      <line x1="0" y1="360" x2="1920" y2="360" stroke-width="0.3"/>
      <line x1="0" y1="420" x2="1920" y2="420" stroke-width="0.3"/>
      <line x1="0" y1="480" x2="1920" y2="480" stroke-width="0.3"/>
      <line x1="0" y1="540" x2="1920" y2="540" stroke-width="0.3"/>
      <line x1="0" y1="600" x2="1920" y2="600" stroke-width="0.3"/>
      <line x1="0" y1="660" x2="1920" y2="660" stroke-width="0.3"/>
      <line x1="0" y1="720" x2="1920" y2="720" stroke-width="0.3"/>
      <line x1="0" y1="780" x2="1920" y2="780" stroke-width="0.3"/>
      <line x1="0" y1="840" x2="1920" y2="840" stroke-width="0.3"/>
      <line x1="0" y1="900" x2="1920" y2="900" stroke-width="0.3"/>
      <line x1="0" y1="960" x2="1920" y2="960" stroke-width="0.3"/>
      <line x1="0" y1="1020" x2="1920" y2="1020" stroke-width="0.3"/>
      <!-- Vertical grid lines -->
      <line x1="120" y1="0" x2="120" y2="1080" stroke-width="0.2"/>
      <line x1="240" y1="0" x2="240" y2="1080" stroke-width="0.2"/>
      <line x1="360" y1="0" x2="360" y2="1080" stroke-width="0.2"/>
      <line x1="480" y1="0" x2="480" y2="1080" stroke-width="0.2"/>
      <line x1="600" y1="0" x2="600" y2="1080" stroke-width="0.2"/>
      <line x1="720" y1="0" x2="720" y2="1080" stroke-width="0.2"/>
      <line x1="840" y1="0" x2="840" y2="1080" stroke-width="0.2"/>
      <line x1="960" y1="0" x2="960" y2="1080" stroke-width="0.2"/>
      <line x1="1080" y1="0" x2="1080" y2="1080" stroke-width="0.2"/>
      <line x1="1200" y1="0" x2="1200" y2="1080" stroke-width="0.2"/>
      <line x1="1320" y1="0" x2="1320" y2="1080" stroke-width="0.2"/>
      <line x1="1440" y1="0" x2="1440" y2="1080" stroke-width="0.2"/>
      <line x1="1560" y1="0" x2="1560" y2="1080" stroke-width="0.2"/>
      <line x1="1680" y1="0" x2="1680" y2="1080" stroke-width="0.2"/>
      <line x1="1800" y1="0" x2="1800" y2="1080" stroke-width="0.2"/>
    </g>
    <!-- Prism refraction bars (diagonal, scattered) -->
    <!-- Bar 1 — top-left area -->
    <g transform="translate(300 150) rotate(-20)" opacity="0.35">
      <rect x="0" y="0" width="200" height="3" fill="currentColor" stroke="none" rx="1"/>
      <rect x="10" y="6" width="180" height="2" fill="currentColor" stroke="none" rx="1" opacity="0.6"/>
      <rect x="20" y="11" width="160" height="1.5" fill="currentColor" stroke="none" rx="1" opacity="0.4"/>
    </g>
    <!-- Bar 2 — center area -->
    <g transform="translate(800 400) rotate(-15)" opacity="0.3">
      <rect x="0" y="0" width="250" height="3" fill="currentColor" stroke="none" rx="1"/>
      <rect x="15" y="6" width="220" height="2" fill="currentColor" stroke="none" rx="1" opacity="0.6"/>
      <rect x="30" y="11" width="190" height="1.5" fill="currentColor" stroke="none" rx="1" opacity="0.4"/>
    </g>
    <!-- Bar 3 — right area -->
    <g transform="translate(1400 250) rotate(-25)" opacity="0.3">
      <rect x="0" y="0" width="180" height="3" fill="currentColor" stroke="none" rx="1"/>
      <rect x="10" y="6" width="160" height="2" fill="currentColor" stroke="none" rx="1" opacity="0.6"/>
      <rect x="20" y="11" width="140" height="1.5" fill="currentColor" stroke="none" rx="1" opacity="0.4"/>
    </g>
    <!-- Bar 4 — bottom-center -->
    <g transform="translate(600 750) rotate(-18)" opacity="0.25">
      <rect x="0" y="0" width="220" height="3" fill="currentColor" stroke="none" rx="1"/>
      <rect x="12" y="6" width="196" height="2" fill="currentColor" stroke="none" rx="1" opacity="0.6"/>
      <rect x="24" y="11" width="172" height="1.5" fill="currentColor" stroke="none" rx="1" opacity="0.4"/>
    </g>
    <!-- Central prism shape -->
    <g transform="translate(960 540)" opacity="0.2">
      <polygon points="0,-80 70,40 -70,40" stroke-width="1.5"/>
      <!-- Inner refraction lines -->
      <line x1="-20" y1="10" x2="60" y2="-30" stroke-width="0.5" opacity="0.5"/>
      <line x1="-30" y1="25" x2="50" y2="-15" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="-60" x2="40" y2="30" stroke-width="0.5" opacity="0.3"/>
    </g>
  </g>
</svg>