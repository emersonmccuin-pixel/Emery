      <text font-family="monospace" font-size="14" y="100">0</text>
      <text font-family="monospace" font-size="14" y="130">1</text>
      <text font-family="monospace" font-size="14" y="160">1</text>
      <text font-family="monospace" font-size="14" y="190">0</text>
