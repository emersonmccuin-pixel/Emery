    <path d="M0 120 H40 V60 H80"/>
    <path d="M30 0 V50 H70"/>
    <path d="M70 0 V30 H120 V60"/>
    <circle cx="60" cy="40" r="2" fill="currentColor" stroke="none"/>
    <circle cx="40" cy="60" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="70" cy="30" r="2" fill="currentColor" stroke="none"/>
    <circle cx="120" cy="60" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="50" cy="50" r="18" stroke-dasharray="3 6"/>
    <line x1="50" y1="26" x2="50" y2="38"/>
    <line x1="50" y1="62" x2="50" y2="74"/>
    <line x1="26" y1="50" x2="38" y2="50"/>
    <line x1="62" y1="50" x2="74" y2="50"/>
    <line x1="50" y1="32" x2="54" y2="32" stroke-width="0.5"/>
    <line x1="50" y1="68" x2="54" y2="68" stroke-width="0.5"/>
    <line x1="32" y1="50" x2="32" y2="54" stroke-width="0.5"/>
    <line x1="68" y1="50" x2="68" y2="54" stroke-width="0.5"/>
    <path d="M8 8 H28 M8 8 V28" stroke-width="1.5"/>
  </g>
