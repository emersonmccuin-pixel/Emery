    <line x1="26" y1="50" x2="38" y2="50"/>
    <line x1="62" y1="50" x2="74" y2="50"/>
    <line x1="50" y1="32" x2="54" y2="32" stroke-width="0.5"/>
    <line x1="50" y1="68" x2="54" y2="68" stroke-width="0.5"/>
    <line x1="32" y1="50" x2="32" y2="54" stroke-width="0.5"/>
    <line x1="68" y1="50" x2="68" y2="54" stroke-width="0.5"/>
    <path d="M8 8 H28 M8 8 V28" stroke-width="1.5"/>
  </g>

  <!-- Bottom-right corner -->
