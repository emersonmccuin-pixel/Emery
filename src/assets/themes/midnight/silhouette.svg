<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="currentColor" stroke="currentColor">
  <!-- Star field: scattered dots of varying size -->
  <g stroke="none">
    <!-- Large stars -->
    <circle cx="180" cy="120" r="2.5"/>
    <circle cx="520" cy="80" r="2"/>
    <circle cx="890" cy="160" r="3"/>
    <circle cx="1340" cy="90" r="2.5"/>
    <circle cx="1720" cy="140" r="2"/>
    <circle cx="340" cy="320" r="2.5"/>
    <circle cx="760" cy="380" r="2"/>
    <circle cx="1100" cy="290" r="3"/>
    <circle cx="1560" cy="350" r="2.5"/>
    <circle cx="1800" cy="420" r="2"/>
    <circle cx="200" cy="560" r="2"/>
    <circle cx="600" cy="620" r="2.5"/>
    <circle cx="960" cy="540" r="2"/>
    <circle cx="1420" cy="600" r="3"/>
    <circle cx="1680" cy="680" r="2"/>
    <circle cx="100" cy="800" r="2.5"/>
    <circle cx="440" cy="860" r="2"/>
    <circle cx="820" cy="780" r="2.5"/>
    <circle cx="1200" cy="840" r="2"/>
    <circle cx="1580" cy="900" r="3"/>
    <circle cx="1900" cy="820" r="2"/>
    <!-- Medium stars -->
    <circle cx="70" cy="200" r="1.5"/>
    <circle cx="310" cy="50" r="1.5"/>
    <circle cx="650" cy="240" r="1.5"/>
    <circle cx="1050" cy="60" r="1.5"/>
    <circle cx="1250" cy="200" r="1.5"/>
    <circle cx="1480" cy="180" r="1.5"/>
    <circle cx="1850" cy="280" r="1.5"/>
    <circle cx="130" cy="440" r="1.5"/>
    <circle cx="480" cy="500" r="1.5"/>
    <circle cx="1150" cy="480" r="1.5"/>
    <circle cx="1650" cy="520" r="1.5"/>
    <circle cx="280" cy="700" r="1.5"/>
    <circle cx="700" cy="740" r="1.5"/>
    <circle cx="1020" cy="700" r="1.5"/>
    <circle cx="1350" cy="760" r="1.5"/>
    <circle cx="1750" cy="960" r="1.5"/>
    <circle cx="550" cy="960" r="1.5"/>
    <!-- Small stars -->
    <circle cx="40" cy="60" r="1"/>
    <circle cx="250" cy="180" r="1"/>
    <circle cx="420" cy="140" r="1"/>
    <circle cx="580" cy="300" r="1"/>
    <circle cx="730" cy="110" r="1"/>
    <circle cx="950" cy="350" r="1"/>
    <circle cx="1080" cy="420" r="1"/>
    <circle cx="1200" cy="140" r="1"/>
    <circle cx="1380" cy="440" r="1"/>
    <circle cx="1520" cy="260" r="1"/>
    <circle cx="1620" cy="100" r="1"/>
    <circle cx="1780" cy="560" r="1"/>
    <circle cx="90" cy="650" r="1"/>
    <circle cx="370" cy="580" r="1"/>
    <circle cx="510" cy="720" r="1"/>
    <circle cx="850" cy="660" r="1"/>
    <circle cx="1000" cy="880" r="1"/>
    <circle cx="1300" cy="920" r="1"/>
    <circle cx="1460" cy="700" r="1"/>
    <circle cx="1660" cy="840" r="1"/>
    <circle cx="1870" cy="640" r="1"/>
    <circle cx="160" cy="980" r="1"/>
    <circle cx="680" cy="1020" r="1"/>
    <circle cx="1130" cy="1000" r="1"/>
    <circle cx="1540" cy="1040" r="1"/>
  </g>

  <!-- Constellation lines connecting select stars -->
  <g fill="none" stroke-width="0.6" stroke-dasharray="6 4">
    <!-- Constellation 1: upper-left — angular wing shape -->
    <polyline points="180,120 310,50 520,80 650,240 480,500"/>
    <polyline points="310,50 420,140 520,80"/>
    <line x1="180" y1="120" x2="70" y2="200"/>

    <!-- Constellation 2: upper-right — jagged crown -->
    <polyline points="1050,60 1200,140 1340,90 1480,180 1620,100"/>
    <polyline points="1200,140 1250,200 1340,90"/>
    <line x1="1480" y1="180" x2="1520" y2="260"/>

    <!-- Constellation 3: center — diamond cross -->
    <polyline points="760,380 890,160 1100,290 960,540 760,380"/>
    <line x1="890" y1="160" x2="960" y2="540"/>
    <line x1="760" y1="380" x2="1100" y2="290"/>

    <!-- Constellation 4: lower-left — arrow pointing down -->
    <polyline points="200,560 340,320 600,620"/>
    <polyline points="280,700 340,320"/>
    <line x1="200" y1="560" x2="280" y2="700"/>

    <!-- Constellation 5: lower-right — scattered arc -->
    <polyline points="1420,600 1560,350 1800,420 1680,680"/>
    <line x1="1560" y1="350" x2="1650" y2="520"/>
    <line x1="1680" y1="680" x2="1580" y2="900"/>
  </g>

  <!-- Dim star flare crosses on the brightest stars -->
  <g fill="none" stroke-width="0.4">
    <line x1="890" y1="152" x2="890" y2="168"/>
    <line x1="882" y1="160" x2="898" y2="160"/>
    <line x1="1100" y1="282" x2="1100" y2="298"/>
    <line x1="1092" y1="290" x2="1108" y2="290"/>
    <line x1="1420" y1="592" x2="1420" y2="608"/>
    <line x1="1412" y1="600" x2="1428" y2="600"/>
    <line x1="1580" y1="892" x2="1580" y2="908"/>
    <line x1="1572" y1="900" x2="1588" y2="900"/>
  </g>
</svg>