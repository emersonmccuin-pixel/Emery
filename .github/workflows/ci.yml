name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Check repository health
        run: npm run check:repo-health

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Create external binary placeholders
        run: |
          $triple = "x86_64-pc-windows-msvc"
          $binDir = "src-tauri/binaries"
          New-Item -ItemType Directory -Path $binDir -Force | Out-Null
          foreach ($bin in @("project-commander-supervisor", "project-commander-cli")) {
            [System.IO.File]::Create("$binDir/$bin-$triple.exe").Close()
          }

      - name: Run library tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Run supervisor tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --bin project-commander-supervisor

      - name: Run supervisor integration smoke tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --test supervisor_client_recovery
